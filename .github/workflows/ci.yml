name: CI

# Lint + tests on push and PR. Training is intentionally NOT run in CI.
on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (locked deps + package)
        run: |
          python -m pip install --upgrade pip pip-tools
          pip-sync requirements.lock
          pip install -e .

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest
